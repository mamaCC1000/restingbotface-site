  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

id {{ hairline }};\">\n    <a href=\"#top\" style=\"display: flex; align-items: center; gap: 11px; text-decoration: none; line-height: 1;\">\n      <span style=\"width: 30px; height: 30px; border-radius: 8px; background: {{ ink }}; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;\">\n        <span style=\"display: flex; gap: 6px;\">\n          <span style=\"width: 4.5px; height: 4.5px; border-radius: 50%; background: {{ accent }};\"><\u002Fspan>\n          <span style=\"width: 4.5px; height: 4.5px; border-radius: 50%; background: {{ accent }};\"><\u002Fspan>\n        <\u002Fspan>\n        <span style=\"width: 13px; height: 2px; border-radius: 2px; background: {{ paper }};\"><\u002Fspan>\n      <\u002Fspan>\n      <span style=\"font-family: 'Alfa Slab One', serif; font-size: 26px; letter-spacing: 0.02em; color: {{ ink }};\">R<span style=\"color: {{ accent }};\">B<\u002Fspan>F<\u002Fspan>\n    <\u002Fa>\n    <div style=\"display: flex; align-items: center; gap: 40px;\">\n      <a href=\"#work\" style=\"font-size: 15px; font-weight: 500; color: {{ ink }}; text-decoration: none; letter-spacing: 0.01em;\" style-hover=\"color: {{ accent }};\">Work<\u002Fa>\n      <a href=\"#apps\" style=\"font-size: 15px; font-weight: 500; color: {{ ink }}; text-decoration: none; letter-spacing: 0.01em;\" style-hover=\"color: {{ accent }};\">Apps<\u002Fa>\n      <a href=\"#about\" style=\"font-size: 15px; font-weight: 500; color: {{ ink }}; text-decoration: none; letter-spacing: 0.01em;\" style-hover=\"color: {{ accent }};\">About<\u002Fa>\n      <a href=\"#contact\" style=\"font-size: 14px; font-weight: 600; color: {{ paper }}; background: {{ ink }}; text-decoration: none; padding: 10px 20px; border-radius: 100px; letter-spacing: 0.01em;\" style-hover=\"background: {{ accent }};\">Contact<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ===== HERO ===== -->\n  <header id=\"top\" style=\"position: relative; padding: 96px 48px 88px;\">\n    <div style=\"max-width: 1180px; margin: 0 auto;\">\n      <div style=\"display: inline-flex; align-items: center; gap: 12px; margin-bottom: 40px;\">\n        <span style=\"width: 9px; height: 9px; border-radius: 50%; background: {{ accent }};\"><\u002Fspan>\n        <span style=\"font-size: 13px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: {{ inkSoft }};\">Independent technology studio · California<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"font-family: 'Alfa Slab One', serif; font-weight: 400; font-size: clamp(48px, 8.5vw, 118px); line-height: 0.92; letter-spacing: -0.01em; max-width: 15ch; text-wrap: balance;\">Software with a straight <span style=\"color: {{ accent }};\">face.<\u002Fspan><\u002Fh1>\n      <div style=\"position: relative; display: inline-block; margin-top: 34px;\">\n        <p style=\"font-size: clamp(18px, 2.2vw, 23px); line-height: 1.5; max-width: 46ch; color: {{ inkSoft }};\">Resting Bot Face builds focused products for real people — mobile apps, web platforms, and the quiet infrastructure small teams actually need.<\u002Fp>\n        <span style=\"position: absolute; right: -110px; top: 6px; font-family: 'Caveat', cursive; font-size: 30px; color: {{ accent }}; transform: rotate(-7deg); white-space: nowrap;\">no fluff ↗<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-wrap: wrap; gap: 16px; margin-top: 48px;\">\n        <a href=\"#work\" style=\"display: inline-flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; color: {{ paper }}; background: {{ ink }}; text-decoration: none; padding: 16px 30px; border-radius: 100px;\" style-hover=\"background: {{ accent }};\">View the work <span aria-hidden=\"true\">→<\u002Fspan><\u002Fa>\n        <a href=\"#contact\" style=\"display: inline-flex; align-items: center; font-size: 16px; font-weight: 600; color: {{ ink }}; background: transparent; text-decoration: none; padding: 16px 30px; border-radius: 100px; border: 1.5px solid {{ ink }};\" style-hover=\"background: {{ ink }}; color: {{ paper }};\">Start a project<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width: 1180px; margin: 84px auto 0; border-top: 1px solid {{ hairline }}; padding-top: 24px; display: flex; flex-wrap: wrap; gap: 48px;\">\n      <div><div style=\"font-family: 'Alfa Slab One', serif; font-size: 34px; color: {{ accent }};\">4<\u002Fdiv><div style=\"font-size: 13px; color: {{ inkSoft }}; letter-spacing: 0.04em; margin-top: 4px;\">apps in flight<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family: 'Alfa Slab One', serif; font-size: 34px;\">1<\u002Fdiv><div style=\"font-size: 13px; color: {{ inkSoft }}; letter-spacing: 0.04em; margin-top: 4px;\">focused studio<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family: 'Alfa Slab One', serif; font-size: 34px;\">0<\u002Fdiv><div style=\"font-size: 13px; color: {{ inkSoft }}; letter-spacing: 0.04em; margin-top: 4px;\">meetings that could've been email<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== WHAT WE BUILD ===== -->\n  <section id=\"work\" style=\"padding: 80px 48px; background: {{ ink }}; color: {{ paper }};\">\n    <div style=\"max-width: 1180px; margin: 0 auto;\">\n      <div style=\"display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 56px;\">\n        <h2 style=\"font-family: 'Alfa Slab One', serif; font-weight: 400; font-size: clamp(34px, 5vw, 58px); line-height: 1;\">What we build<\u002Fh2>\n        <span style=\"font-size: 14px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: {{ accent }};\">Four things, done well<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1px; background: {{ inkHair }}; border: 1px solid {{ inkHair }};\">\n        <sc-for list=\"{{ services }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"background: {{ ink }}; padding: 36px 32px 40px; min-height: 260px; display: flex; flex-direction: column;\" style-hover=\"background: {{ inkHover }};\">\n            <div style=\"font-family: 'Alfa Slab One', serif; font-size: 22px; color: {{ accent }}; margin-bottom: 28px;\">{{ s.num }}<\u002Fdiv>\n            <h3 style=\"font-family: 'Work Sans', sans-serif; font-weight: 600; font-size: 22px; line-height: 1.15; margin-bottom: 12px;\">{{ s.title }}<\u002Fh3>\n            <p style=\"font-size: 15px; line-height: 1.55; color: {{ paperSoft }};\">{{ s.body }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CURRENT APPS ===== -->\n  <section id=\"apps\" style=\"padding: 96px 48px;\">\n    <div style=\"max-width: 1180px; margin: 0 auto;\">\n      <div style=\"display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 20px;\">\n        <h2 style=\"font-family: 'Alfa Slab One', serif; font-weight: 400; font-size: clamp(34px, 5vw, 58px); line-height: 1;\">Current apps<\u002Fh2>\n        <span style=\"font-size: 14px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: {{ inkSoft }};\">In the workshop<\u002Fspan>\n      <\u002Fdiv>\n      <sc-for list=\"{{ apps }}\" as=\"a\" hint-placeholder-count=\"4\">\n        <div style=\"display: grid; grid-template-columns: 64px 1fr auto; align-items: center; gap: 28px; padding: 34px 8px; border-top: 1px solid {{ hairline }};\" style-hover=\"background: {{ paperTint }};\">\n          <div style=\"font-family: 'Alfa Slab One', serif; font-size: 22px; color: {{ inkFaint }};\">{{ a.num }}<\u002Fdiv>\n          <div>\n            <div style=\"display: flex; align-items: center; gap: 14px; flex-wrap: wrap;\">\n              <h3 style=\"font-family: 'Alfa Slab One', serif; font-weight: 400; font-size: clamp(24px, 3.4vw, 38px); line-height: 1;\">{{ a.name }}<\u002Fh3>\n            <\u002Fdiv>\n
